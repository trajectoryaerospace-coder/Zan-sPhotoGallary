<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zanieke Premium Dark Museum</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Playfair+Display:ital,wght@0,600;1,400&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --dynamic-pink: #2C0B18;
            --dark-pink: #FF69B4;
            --pastel-blue: #0A141D;
            --deep-blue: #111A24;
            --museum-gold: #D4AF37;
            --text-main: #FFF0F5;
            --text-sub: #A59497;
            --card-bg: rgba(30, 20, 25, 0.85);
            --input-bg: #1A1215;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Quicksand', sans-serif;
            color: var(--text-main);
            background-color: var(--pastel-blue);
        }

        body {
            background: linear-gradient(135deg, var(--dynamic-pink), var(--pastel-blue));
            position: relative;
            transition: background 0.5s ease;
        }

        #password-gateway {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #2C0B18, #0A141D);
            z-index: 100000;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
        }

        .water-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 1;
            overflow: hidden;
            pointer-events: none;
            opacity: 0.45;
        }

        .wave {
            position: absolute;
            width: 250vw;
            height: 250vw;
            top: -140vw;
            left: -75vw;
            background: linear-gradient(45deg, rgba(255, 105, 180, 0.15), rgba(112, 161, 255, 0.15));
            border-radius: 43% 40% 45% 40%;
            animation: fluidDrift 18s infinite linear;
        }

        .wave:nth-child(2) {
            top: -135vw;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1), rgba(255, 183, 206, 0.1));
            border-radius: 40% 45% 40% 43%;
            animation: fluidDrift 12s infinite linear;
        }

        @keyframes fluidDrift {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        #landscape-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #2C0B18, #0A141D);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 99999;
            text-align: center;
            padding: 30px;
        }

        #landscape-warning h2 { font-family: 'Fredoka', sans-serif; color: var(--dark-pink); font-size: 2.2rem; margin: 15px 0 10px 0; }
        #landscape-warning p { font-size: 1.1rem; font-weight: bold; color: var(--text-sub); }

        @media (orientation: landscape) {
            #landscape-warning { display: flex; }
            #gallery-container { display: none; }
        }
        @media (orientation: portrait) {
            #landscape-warning { display: none; }
            #gallery-container { display: block; }
        }

        #gallery-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
            position: relative;
            z-index: 2;
        }

        .slide {
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 0;
            position: relative;
        }

        /* Order placement mapping targets */
        .welcome-slide { order: -9999999; }
        .add-slide { order: 9999999; }

        .welcome-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 45px 25px;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            text-align: center;
            width: calc(100% - 50px);
            max-width: 340px;
        }
        .welcome-top { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 4px; color: var(--dark-pink); margin: 0 0 10px 0; font-weight: 700; }
        .welcome-title { font-family: 'Playfair Display', serif; font-size: 2.6rem; margin: 0 0 20px 0; line-height: 1.2; font-weight: 600; }
        .welcome-sub { font-size: 0.95rem; color: var(--text-sub); font-style: italic; border-top: 1px dashed rgba(255, 105, 180, 0.3); padding-top: 15px; margin: 0; }
        .scroll-indicator { position: absolute; bottom: 45px; font-size: 0.9rem; font-weight: bold; color: var(--dark-pink); animation: arrowBounce 2s infinite; text-align: center; width: 100%; }

        @keyframes arrowBounce { 0%, 100% { transform: translateY(0); opacity: 0.5; } 50% { transform: translateY(6px); opacity: 1; } }

        .view-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 30px 25px;
            position: relative;
        }

        /* Favorite Top Left Controller Styling */
        .fav-wrapper {
            position: absolute;
            top: 30px;
            left: 25px;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(30, 20, 25, 0.6);
            padding: 6px 12px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .fav-checkbox {
            width: 18px;
            height: 18px;
            accent-color: var(--dark-pink);
            cursor: pointer;
            margin: 0;
        }

        .fav-wrapper label {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
            user-select: none;
        }

        .museum-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 2.6rem;
            color: var(--text-main);
            margin: 0 0 35px 0;
            text-align: center;
            font-weight: 600;
            width: 100%;
        }

        .museum-frame {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            max-height: 42vh;
            margin: 0 0 35px 0;
            padding: 6px; /* Space for gradient border wrapper visualization */
            border-radius: 20px;
            background: transparent;
            transition: background 0.3s ease;
        }

        .museum-frame img {
            max-width: 100%;
            max-height: 42vh;
            width: auto;
            height: auto;
            display: block;
            border: 6px solid var(--museum-gold);
            border-radius: 14px;
            box-shadow: 0 16px 38px rgba(0, 0, 0, 0.6);
            object-fit: contain;
            transition: border-color 0.3s ease;
        }

        /* Favorite Golden Pink Matrix Border State overrides */
        .museum-slide.is-favorite-art .museum-frame img {
            border-image: linear-gradient(45deg, var(--museum-gold), var(--dark-pink)) 6;
        }

        .museum-slide.landscape-art .museum-frame img {
            cursor: pointer;
        }

        .museum-desc {
            font-size: 0.95rem;
            color: var(--text-sub);
            text-align: center;
            margin: 0 0 35px 0;
            max-width: 85%;
            line-height: 1.4;
            font-weight: 400;
        }

        .slide-controls {
            display: flex;
            gap: 14px;
            justify-content: center;
            width: 100%;
        }

        .fullscreen-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000000;
            z-index: 9999;
            display: none;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .fullscreen-overlay img {
            transform: rotate(90deg);
            transform-origin: center center;
            width: 100vh;
            height: 100vw;
            object-fit: contain;
            display: block;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 30px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .action-btn:active { transform: scale(0.93); }
        .action-btn.edit-btn {
            background: linear-gradient(135deg, rgba(255, 105, 180, 0.25), rgba(112, 161, 255, 0.25));
            border-color: rgba(255, 105, 180, 0.5);
        }

        .edit-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            z-index: 15;
            padding: 0 25px;
        }

        .curator-card {
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 30px 24px;
            border-radius: 36px;
            box-shadow: 0 25px 55px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 340px;
            display: flex;
            flex-direction: column;
            gap: 14px;
            align-items: center;
            border: 2px dashed var(--dark-pink);
        }

        .curator-card h2, .curator-card h3 { 
            color: var(--dark-pink); 
            margin: 0; 
            font-family: 'Fredoka', sans-serif; 
            font-size: 1.6rem; 
            text-align: center;
        }

        input[type="file"] { display: none; }
        
        .file-trigger {
            display: block;
            width: 100%;
            text-align: center;
            padding: 12px;
            cursor: pointer;
            background: var(--input-bg);
            color: var(--dark-pink);
            border: 2px solid var(--dark-pink);
            border-radius: 18px;
            font-weight: 700;
            font-size: 0.95rem;
        }

        .checkbox-row {
            display: flex;
            align-items: center;
            justify-content: flex-start;
            gap: 10px;
            width: 100%;
            padding: 2px 6px;
        }

        .checkbox-row input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: var(--dark-pink);
            cursor: pointer;
        }

        .checkbox-row label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text-main);
            cursor: pointer;
        }

        .museum-input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            outline: none;
            background: var(--input-bg);
            color: var(--text-main);
        }
        .museum-input:focus { border-color: var(--dark-pink); }
        textarea.museum-input { resize: none; }
        
        .hang-btn {
            background: linear-gradient(135deg, var(--dark-pink), #FF85A2);
            color: white;
            border: none;
            padding: 14px 0;
            border-radius: 20px;
            font-size: 1.1rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(255, 105, 180, 0.3);
            width: 100%;
        }
        .hang-btn:active { transform: translateY(2px); }

        .edit-buttons-row {
            display: flex;
            width: 100%;
            gap: 10px;
        }
        .edit-buttons-row .action-btn { flex: 1; padding: 12px 0; border-radius: 16px; text-align: center; }
    </style>
</head>
<body>

    <div id="password-gateway">
        <div class="curator-card">
            <h2>Gallery Access Lock</h2>
            <input type="password" id="gateway-password" class="museum-input" placeholder="Enter password...">
            <button id="gateway-submit" class="hang-btn">Unlock Gallery</button>
        </div>
    </div>

    <div class="water-bg">
        <div class="wave"></div>
        <div class="wave ="></div>
    </div>

    <div id="landscape-warning">
        <h2>Portrait Mode Only</h2>
        <p>Please rotate your device upright to enter Zanieke Art Gallery</p>
    </div>

    <div id="lightbox" class="fullscreen-overlay" onclick="closeLightbox()">
        <img id="lightbox-img" src="" alt="Fullscreen Artwork">
    </div>

    <div id="gallery-container" style="display: none;">
        
        <div class="slide welcome-slide">
            <div class="welcome-card">
                <p class="welcome-top">Welcome to</p>
                <h1 class="welcome-title">Zanieke Amazing Photo Gallery</h1>
                <p class="welcome-sub">It is so amazing she is so talented.</p>
            </div>
            <div class="scroll-indicator">Swipe Up to Tour</div>
        </div>

        <div id="add-slide" class="slide add-slide">
            <div class="curator-card">
                <h2>Exhibit a Masterpiece</h2>
                
                <label id="file-label" for="file-input" class="file-trigger">Select Art Photo</label>
                <input type="file" id="file-input" accept="image/*">
                
                <input type="text" id="title-input" class="museum-input" placeholder="Name of your masterpiece..." autocomplete="off">
                
                <textarea id="desc-input" class="museum-input" placeholder="Describe the artistic vision..." rows="2"></textarea>
                
                <div class="checkbox-row">
                    <input type="checkbox" id="landscape-checkbox">
                    <label for="landscape-checkbox">Landscape Layout</label>
                </div>
                
                <button id="add-btn" class="hang-btn">Hang in Gallery</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, push, set, onChildAdded, onChildChanged, onChildRemoved, update, remove } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAgeeyZ62BLz28AkrxQVqj5LCDUeESETyc",
            authDomain: "amazinggallaryzan.firebaseapp.com",
            projectId: "amazinggallaryzan",
            storageBucket: "amazinggallaryzan.firebasestorage.app",
            messagingSenderId: "497137144336",
            appId: "1:497137144336:web:3ca5b81a40d0de7e5bf095"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, "https://amazinggallaryzan-default-rtdb.firebaseio.com");
        const artworksRef = ref(db, 'artworks');

        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const titleInput = document.getElementById('title-input');
        const descInput = document.getElementById('desc-input');
        const landscapeCheckbox = document.getElementById('landscape-checkbox');
        const addBtn = document.getElementById('add-btn');
        const container = document.getElementById('gallery-container');
        const addSlide = document.getElementById('add-slide');

        const gatewayScreen = document.getElementById('password-gateway');
        const passwordField = document.getElementById('gateway-password');
        const submitPassword = document.getElementById('gateway-submit');

        if (localStorage.getItem('zan_gallery_auth') === 'passed') {
            gatewayScreen.style.display = 'none';
            container.style.display = 'block';
        }

        submitPassword.addEventListener('click', () => {
            if (passwordField.value === 'ilovezan') {
                localStorage.setItem('zan_gallery_auth', 'passed');
                gatewayScreen.style.display = 'none';
                container.style.display = 'block';
            } else {
                alert('Incorrect gallery key entry credential.');
            }
        });

        container.addEventListener('scroll', () => {
            const maxScroll = container.scrollHeight - container.clientHeight;
            if (maxScroll <= 0) return;
            const scrollPercent = container.scrollTop / maxScroll;
            const darkHue = Math.floor(290 + (scrollPercent * 65));
            document.documentElement.style.setProperty('--dynamic-pink', `hsl(${darkHue}, 60%, 13%)`);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) fileLabel.textContent = "Photo Loaded";
        });

        function resizeAndCompressImage(file, callback) {
            const reader = new FileReader();
            reader.onload = function (event) {
                const img = new Image();
                img.onload = function () {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const MAX_HEIGHT = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
                    } else {
                        if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.6));
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        addBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            const title = titleInput.value.trim();
            const desc = descInput.value.trim();
            const isLandscape = landscapeCheckbox.checked;
            
            if (!file) { alert('Please pick a photograph to exhibit'); return; }
            if (!title) { alert('Every masterpiece needs a title'); return; }
            
            addBtn.disabled = true;
            addBtn.textContent = "Hanging...";

            resizeAndCompressImage(file, function(compressedUrl) {
                const newArtRef = push(artworksRef);
                set(newArtRef, {
                    title: title,
                    description: desc,
                    landscape: isLandscape,
                    image: compressedUrl,
                    favorite: false,
                    timestamp: Date.now() // Track insertion order metrics for standard stacking
                }).then(() => {
                    fileInput.value = '';
                    titleInput.value = '';
                    descInput.value = '';
                    landscapeCheckbox.checked = false;
                    fileLabel.textContent = "Select Art Photo";
                    addBtn.disabled = false;
                    addBtn.textContent = "Hang in Gallery";
                }).catch((error) => {
                    alert("Firebase save failed.");
                    addBtn.disabled = false;
                    addBtn.textContent = "Hang in Gallery";
                });
            });
        });

        // Dynamic Order Index Calculation Engine
        function calculateFlexOrder(isFavorite, timestamp) {
            const baseTime = 1800000000000; // Future benchmark reference mapping
            const invertTime = baseTime - (timestamp || Date.now());
            // Favorites receive dynamic hyper-prioritized structural indexing layout values
            if (isFavorite) {
                return Math.floor(-200000000000 + invertTime);
            }
            return Math.floor(invertTime);
        }

        onChildAdded(artworksRef, (snapshot) => {
            const id = snapshot.key;
            const data = snapshot.val();
            
            const newSlide = document.createElement('div');
            newSlide.className = `slide museum-slide ${data.landscape ? 'landscape-art' : ''} ${data.favorite ? 'is-favorite-art' : ''}`;
            newSlide.id = `slide-${id}`;
            newSlide.style.order = calculateFlexOrder(data.favorite, data.timestamp);
            
            newSlide.innerHTML = `
                <div class="view-container">
                    <div class="fav-wrapper">
                        <input type="checkbox" class="fav-checkbox" id="fav-check-${id}" ${data.favorite ? 'checked' : ''} onchange="toggleFavState('${id}', this.checked)">
                        <label for="fav-check-${id}">🌟 Fav</label>
                    </div>
                    <h2 class="museum-title">${escapeHTML(data.title)}</h2>
                    <div class="museum-frame">
                        ${data.image ? `<img src="${data.image}" class="exhibit-image" alt="Artwork" onclick="openLightbox(this)">` : ''}
                    </div>
                    <p class="museum-desc">${escapeHTML(data.description || '')}</p>
                    <div class="slide-controls">
                        <button class="action-btn edit-btn" onclick="openEditor('${id}')">Edit</button>
                        <button class="action-btn remove-btn" onclick="fbRemoveSlide('${id}')">Remove</button>
                    </div>
                </div>

                <div class="edit-container" style="display: none;">
                    <div class="curator-card">
                        <h3>Edit Artwork</h3>
                        <input type="text" class="museum-input edit-title-field" value="${escapeHTML(data.title)}">
                        <textarea class="museum-input edit-desc-field" rows="2">${escapeHTML(data.description || '')}</textarea>
                        
                        <div class="checkbox-row">
                            <input type="checkbox" class="edit-landscape-field" ${data.landscape ? 'checked' : ''}>
                            <label>Landscape Layout</label>
                        </div>

                        <label class="file-trigger">Update Photo
                            <input type="file" accept="image/*" class="edit-file-field" onchange="cacheEditImage(this, '${id}')">
                        </label>
                        
                        <button class="action-btn" style="background:#FF4757; color:white; border:none;" onclick="flagEditImageRemoval('${id}')">Remove Image</button>
                        
                        <div class="edit-buttons-row">
                            <button class="action-btn" onclick="closeEditor('${id}')">Cancel</button>
                            <button class="action-btn edit-btn" onclick="fbSaveSlideEdits('${id}')">Save</button>
                        </div>
                    </div>
                </div>
            `;
            container.appendChild(newSlide);
        });

        onChildChanged(artworksRef, (snapshot) => {
            const id = snapshot.key;
            const data = snapshot.val();
            const slide = document.getElementById(`slide-${id}`);
            if (!slide) return;

            slide.style.order = calculateFlexOrder(data.favorite, data.timestamp);
            slide.querySelector('.museum-title').textContent = data.title;
            slide.querySelector('.museum-desc').textContent = data.description || '';
            
            if (data.landscape) slide.classList.add('landscape-art');
            else slide.classList.remove('landscape-art');

            if (data.favorite) slide.classList.add('is-favorite-art');
            else slide.classList.remove('is-favorite-art');

            const favCheckbox = slide.querySelector('.fav-checkbox');
            if (favCheckbox) favCheckbox.checked = data.favorite;

            const frame = slide.querySelector('.museum-frame');
            if (data.image) {
                frame.innerHTML = `<img src="${data.image}" class="exhibit-image" alt="Artwork" onclick="openLightbox(this)">`;
            } else {
                frame.innerHTML = '';
            }

            slide.querySelector('.edit-title-field').value = data.title;
            slide.querySelector('.edit-desc-field').value = data.description || '';
            slide.querySelector('.edit-landscape-field').checked = data.landscape;
        });

        onChildRemoved(artworksRef, (snapshot) => {
            const id = snapshot.key;
            const slide = document.getElementById(`slide-${id}`);
            if (slide) {
                slide.style.opacity = '0';
                slide.style.transition = 'opacity 0.3s ease';
                setTimeout(() => { slide.remove(); }, 300);
            }
        });

        window.toggleFavState = function(id, state) {
            update(ref(db, `artworks/${id}`), { favorite: state });
        };

        window.openEditor = function(id) {
            const slide = document.getElementById(`slide-${id}`);
            slide.querySelector('.view-container').style.display = 'none';
            slide.querySelector('.edit-container').style.display = 'flex';
        };

        window.closeEditor = function(id) {
            const slide = document.getElementById(`slide-${id}`);
            slide.removeAttribute('data-pending-img');
            slide.querySelector('.edit-container').style.display = 'none';
            slide.querySelector('.view-container').style.display = 'flex';
        };

        window.cacheEditImage = function(input, id) {
            if (input.files && input.files[0]) {
                resizeAndCompressImage(input.files[0], function(compressedUrl) {
                    const slide = document.getElementById(`slide-${id}`);
                    slide.setAttribute('data-pending-img', compressedUrl);
                });
            }
        };

        window.flagEditImageRemoval = function(id) {
            const slide = document.getElementById(`slide-${id}`);
            slide.setAttribute('data-pending-img', 'REMOVE_IMAGE');
            alert('Image flagged for removal. Click Save to execute.');
        };

        window.fbSaveSlideEdits = function(id) {
            const slide = document.getElementById(`slide-${id}`);
            const newTitle = slide.querySelector('.edit-title-field').value.trim();
            const newDesc = slide.querySelector('.edit-desc-field').value.trim();
            const checkLandscape = slide.querySelector('.edit-landscape-field').checked;
            
            if (!newTitle) { alert('Title cannot be empty'); return; }

            const updates = {
                title: newTitle,
                description: newDesc,
                landscape: checkLandscape
            };

            const pendingImg = slide.getAttribute('data-pending-img');
            if (pendingImg === 'REMOVE_IMAGE') {
                updates.image = "";
            } else if (pendingImg) {
                updates.image = pendingImg;
            }

            update(ref(db, `artworks/${id}`), updates).then(() => {
                slide.removeAttribute('data-pending-img');
                window.closeEditor(id);
            });
        };

        window.fbRemoveSlide = function(id) {
            if(confirm("Are you sure you want to remove this art piece permanently?")) {
                remove(ref(db, `artworks/${id}`));
            }
        };

        window.openLightbox = function(imgElement) {
            const slide = imgElement.closest('.slide');
            if (slide.classList.contains('landscape-art')) {
                const lightbox = document.getElementById('lightbox');
                const lightboxImg = document.getElementById('lightbox-img');
                lightboxImg.src = imgElement.src;
                lightbox.style.display = 'flex';
            }
        };

        window.closeLightbox = function() {
            const lightbox = document.getElementById('lightbox');
            lightbox.style.display = 'none';
            document.getElementById('lightbox-img').src = '';
        };

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag));
        }
    </script>
</body>
</html>
