<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zanieke's Amazing Photo Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">

    <style>
        /* Base Reset & Pretty Variables */
        :root {
            --primary-pink: #FFB7CE;
            --dark-pink: #FF69B4;
            --soft-white: #FFF0F5;
            --text-color: #4A373A;
            --grey-text: #8A7A7D;
        }

        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--soft-white);
            font-family: 'Quicksand', sans-serif;
            color: var(--text-color);
            -webkit-font-smoothing: antialiased;
        }

        /* Landscape Protection System */
        #rotate-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--primary-pink);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        #rotate-warning .icon {
            font-size: 4rem;
            animation: bounce 2s infinite ease-in-out;
            margin-bottom: 15px;
        }

        #rotate-warning h2 {
            font-family: 'Fredoka', sans-serif;
            color: white;
            font-size: 2rem;
            margin: 0 0 10px 0;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.1);
        }

        #rotate-warning p {
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: bold;
        }

        /* Show warning on Portrait, show gallery on Landscape */
        @media (orientation: portrait) {
            #rotate-warning { display: flex; }
            #gallery-container { display: none; }
        }

        @media (orientation: landscape) {
            #rotate-warning { display: none; }
            #gallery-container { display: block; }
        }

        /* Smooth Vertical Snap Container */
        #gallery-container {
            width: 100vw;
            height: 100vh;
            overflow-y: scroll;
            scroll-snap-type: y mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch; /* Butter-smooth swipe on iOS */
        }

        /* Universal Slide Styling */
        .slide {
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            flex-shrink: 0;
            box-sizing: border-box;
            position: relative;
        }

        /* Slide 1: Welcome Screen */
        .welcome-slide {
            background: var(--primary-pink);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
        }

        .welcome-top {
            font-size: 1.4rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: white;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .welcome-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 3.2rem;
            color: white;
            margin: 0 0 20px 0;
            text-shadow: 3px 3px 0px var(--dark-pink);
            line-height: 1.2;
        }

        .welcome-sub {
            font-size: 1.1rem;
            color: var(--grey-text);
            font-style: italic;
            background: rgba(255, 255, 255, 0.6);
            padding: 8px 20px;
            border-radius: 20px;
        }

        .scroll-hint {
            position: absolute;
            bottom: 25px;
            font-size: 1rem;
            font-weight: bold;
            color: white;
            animation: float 2s infinite ease-in-out;
        }

        /* Slide 2+: Dynamic Image Presenter Slide Layout */
        .image-slide {
            background: #FFF5F7;
            display: grid;
            grid-template-rows: auto 1fr auto;
            justify-items: center;
            align-items: center;
            padding: 15px 30px;
        }

        .slide-title {
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
            color: var(--dark-pink);
            margin: 0;
            text-align: center;
            text-shadow: 1px 1px 0px white;
        }

        .slide-img-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .slide-img-container img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain; /* Retains perfect image aspect ratio */
            border-radius: 20px;
            border: 6px solid white;
            box-shadow: 0 8px 24px rgba(255, 105, 180, 0.15);
        }

        .slide-desc {
            font-size: 1.1rem;
            color: var(--text-color);
            margin: 5px 0 0 0;
            text-align: center;
            max-width: 75%;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.5);
            padding: 4px 15px;
            border-radius: 12px;
        }

        /* Persistent Add Picture Creator Slide Layout */
        .add-slide {
            background: var(--soft-white);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .cute-card {
            background: white;
            padding: 25px 35px;
            border-radius: 32px;
            box-shadow: 0 12px 30px rgba(255, 182, 193, 0.35);
            width: 85%;
            max-width: 550px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
            border: 3px dashed var(--primary-pink);
        }

        .cute-card h2 {
            color: var(--dark-pink);
            margin: 0 0 5px 0;
            font-family: 'Fredoka', sans-serif;
            font-size: 1.8rem;
        }

        input[type="file"] {
            display: none;
        }

        .file-label {
            display: inline-block;
            padding: 10px 24px;
            cursor: pointer;
            background: var(--primary-pink);
            color: white;
            border-radius: 20px;
            font-weight: bold;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(255, 182, 193, 0.4);
            font-size: 0.95rem;
        }

        .file-label:active {
            transform: scale(0.95);
        }

        .input-field {
            width: 100%;
            padding: 10px 16px;
            border: 2px solid #FFE4E1;
            border-radius: 16px;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        .input-field:focus {
            border-color: var(--dark-pink);
        }

        textarea.input-field {
            resize: none;
        }

        .submit-btn {
            background: var(--dark-pink);
            color: white;
            border: none;
            padding: 12px 0;
            border-radius: 25px;
            font-size: 1.1rem;
            font-family: 'Fredoka', sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 6px 16px rgba(255, 105, 180, 0.3);
            transition: all 0.2s ease;
            width: 100%;
            margin-top: 5px;
        }

        .submit-btn:active {
            transform: translateY(2px);
        }

        /* Cute Custom Keyframe Animations */
        @keyframes bounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(10deg); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-8px); opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="rotate-warning">
        <div class="icon">🔄✨</div>
        <h2>Rotate Your Device!</h2>
        <p>Please turn your screen to Landscape Mode to explore Zanieke's masterpieces!</p>
    </div>

    <div id="gallery-container">
        
        <div class="slide welcome-slide">
            <p class="welcome-top">Welcome to</p>
            <h1 class="welcome-title">Zanieke's Amazing Photo Gallery</h1>
            <p class="welcome-sub">It's so amazing she's so talanted.</p>
            <div class="scroll-hint">Swipe Up to Begin 💖</div>
        </div>

        <div id="add-slide" class="slide add-slide">
            <div class="cute-card">
                <h2>Add a New Masterpiece ✨</h2>
                
                <label id="file-label" for="file-input" class="file-label">
                    Choose a Photo 📸
                </label>
                <input type="file" id="file-input" accept="image/*">
                
                <input type="text" id="title-input" class="input-field" placeholder="Give it a cute title..." autocomplete="off">
                
                <textarea id="desc-input" class="input-field" placeholder="Write an adorable description..." rows="2"></textarea>
                
                <button id="add-btn" class="submit-btn">Drop it in! ✨</button>
            </div>
        </div>

    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const fileLabel = document.getElementById('file-label');
        const titleInput = document.getElementById('title-input');
        const descInput = document.getElementById('desc-input');
        const addBtn = document.getElementById('add-btn');
        const container = document.getElementById('gallery-container');
        const addSlide = document.getElementById('add-slide');

        // Dynamic File Handler Label Change
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileLabel.textContent = "Selected! 💖";
                fileLabel.style.background = "#FF69B4";
            }
        });

        // Pipeline to insert picture card and safely float the setup screen lower down
        addBtn.addEventListener('click', () => {
            const file = fileInput.files[0];
            const title = titleInput.value.trim();
            const desc = descInput.value.trim();
            
            if (!file) {
                alert('Oops! Please pick an adorable photo first! 📸');
                return;
            }
            if (!title) {
                alert('Please give your beautiful photo a title! ✨');
                return;
            }
            
            const reader = new FileReader();
            reader.onload = function(e) {
                const imageUrl = e.target.result;
                
                // Build layout system programmatically
                const newSlide = document.createElement('div');
                newSlide.className = 'slide image-slide';
                newSlide.innerHTML = `
                    <h2 class="slide-title">${escapeHTML(title)}</h2>
                    <div class="slide-img-container">
                        <img src="${imageUrl}" alt="${escapeHTML(title)}">
                    </div>
                    <p class="slide-desc">${escapeHTML(desc)}</p>
                `;
                
                // Push structural container element directly above the operational UI layout
                container.insertBefore(newSlide, addSlide);
                
                // Clean configuration settings back to baseline standard layout
                fileInput.value = '';
                titleInput.value = '';
                descInput.value = '';
                fileLabel.textContent = "Choose a Photo 📸";
                fileLabel.style.background = "var(--primary-pink)";
                
                // Perform automated horizontal target alignment drop scroll tracking smoothly
                newSlide.scrollIntoView({ behavior: 'smooth' });
            };
            reader.readAsDataURL(file);
        });

        // Secure clean encoding function to make text parsing completely bulletproof
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;' }[tag] || tag)
            );
        }
    </script>
</body>
</html>
